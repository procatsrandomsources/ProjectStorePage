<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProCats Game Store</title>
    <style>
        :root {
            --bg-color: #111111;
            --card-bg: #222222;
            --text-color: #ffffff;
            --accent-color: #fa5c5c;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        header { text-align: center; padding: 60px 0; }
        
        .game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
        
        /* The Card is now the Icon Background */
        .game-card { 
            position: relative; 
            height: 400px; 
            border-radius: 12px; 
            overflow: hidden; 
            background-size: cover; 
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .game-card:hover { transform: scale(1.02); }

        /* Dark overlay so text is readable */
        .card-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.9) 20%, rgba(0,0,0,0.2) 60%, transparent 100%);
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .status-badge { 
            position: absolute; 
            top: 15px; 
            left: 15px; 
            background: rgba(0,0,0,0.8); 
            padding: 5px 12px; 
            border-radius: 20px; 
            font-size: 11px; 
            font-weight: 800; 
            letter-spacing: 1px;
            text-transform: uppercase; 
        }
        .active { color: #4caf50; border: 1px solid #4caf50; }
        .coming-soon { color: #ffeb3b; border: 1px solid #ffeb3b; }
        .discontinued { color: #ff5252; border: 1px solid #ff5252; }

        .game-title { font-size: 1.5rem; margin: 0; font-weight: bold; }
        .game-desc { font-size: 0.9rem; color: #bbb; margin: 8px 0 15px 0; }

        .download-btn {
            display: block;
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            text-align: center;
            transition: 0.2s;
        }
        .download-btn:hover { background: #ff7373; transform: translateY(-2px); }
        .disabled { background: #444; color: #888; pointer-events: none; }
    </style>
</head>
<body>

<header>
    <h1>PRO CATS SOURCES</h1>
    <p>Official Game Repository</p>
</header>

<div class="game-grid">
    <div class="game-card" style="background-image: url('https://static.vecteezy.com/system/resources/previews/022/059/000/non_2x/no-image-available-icon-vector.jpg');">
        <div class="status-badge active">Active</div>
        <div class="card-overlay">
            <h3 class="game-title">WebGames</h3>
            <p class="game-desc">SLAYYYY GIRL.</p>
            <a href="https://procatsrandomsources.github.io/WebGames/" class="download-btn">Play Now</a>
        </div>
    </div>

    <div class="game-card" style="background-image: url('https://static.vecteezy.com/system/resources/previews/022/059/000/non_2x/no-image-available-icon-vector.jpg');">
        <div class="status-badge coming-soon">Coming Soon</div>
        <div class="card-overlay">
            <h3 class="game-title">Rayworks</h3>
            <p class="game-desc">Shh secret upcoming game.</p>
            <a href="#" class="download-btn disabled">Coming Soon</a>
        </div>
    </div>

    <div class="game-card" style="background-image: url('https://static.vecteezy.com/system/resources/previews/022/059/000/non_2x/no-image-available-icon-vector.jpg');">
        <div class="status-badge discontinued">Discontinued</div>
        <div class="card-overlay">
            <h3 class="game-title">Ray Runners</h3>
            <p class="game-desc">Rays Dream(v3.4).</p>
            <a href="https://github.com/procatsrandomsources/ProjectStorePage/releases/download/3.4/Beta.3.4.apk" class="download-btn">Download APK</a>
        </div>
    </div>

    <div class="game-card" style="background-image: url('https://static.vecteezy.com/system/resources/previews/022/059/000/non_2x/no-image-available-icon-vector.jpg');">
        <div class="status-badge discontinued">Discontinued</div>
        <div class="card-overlay">
            <h3 class="game-title">Horror Works</h3>
            <p class="game-desc">Procats Dream(12.2).</p>
            <a href="https://github.com/procatsrandomsources/ProjectStorePage/releases/download/12.2/Horrorworks.12.2.apk" class="download-btn">Download APK</a>
        </div>
    </div>
</div>

</body>
</html>
